<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent01 架构图解</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #181c24;
      --border: #2d3548;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #388bfd26;
      --success: #3fb950;
      --warning: #d29922;
      --node-fill: #21262d;
      --node-stroke: #30363d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .diagram-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .diagram-section h2 {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .diagram {
      overflow-x: auto;
      padding: 1rem 0;
    }

    .diagram svg {
      display: block;
      margin: 0 auto;
    }

    .node-rect { fill: var(--node-fill); stroke: var(--node-stroke); stroke-width: 1.5; }
    .node-start { fill: #238636; stroke: #2ea043; }
    .node-end { fill: #da3633; stroke: #f85149; }
    .node-decision { fill: var(--accent-dim); stroke: var(--accent); }
    .arrow { stroke: var(--text-muted); stroke-width: 1.5; fill: none; }
    .arrow-label { font-size: 11px; fill: var(--text-muted); }
  </style>
</head>
<body>
  <h1>Agent01 架构图解</h1>

  <!-- 1. AgentLoop 核心循环 -->
  <section class="diagram-section">
    <h2>1. AgentLoop 核心循环</h2>
    <div class="diagram">
      <svg width="520" height="420" viewBox="0 0 520 420" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <path d="M0 0 L8 3 L0 6 Z" fill="#8b949e" />
          </marker>
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15" />
          </filter>
        </defs>

        <!-- 流程节点 -->
        <rect x="190" y="20" width="140" height="40" rx="8" class="node-start" filter="url(#shadow)" />
        <text x="260" y="45" text-anchor="middle" fill="white" font-size="13" font-weight="500">进入 run()</text>

        <rect x="190" y="80" width="140" height="40" rx="8" class="node-rect" filter="url(#shadow)" />
        <text x="260" y="105" text-anchor="middle" fill="#e6edf3" font-size="13">completeChat(messages)</text>

        <rect x="190" y="140" width="140" height="40" rx="8" class="node-rect" filter="url(#shadow)" />
        <text x="260" y="165" text-anchor="middle" fill="#e6edf3" font-size="13">解析 assistant 消息</text>

        <rect x="190" y="200" width="140" height="40" rx="8" class="node-rect" filter="url(#shadow)" />
        <text x="260" y="225" text-anchor="middle" fill="#e6edf3" font-size="13">追加到 messages</text>

        <polygon points="260,270 340,320 260,370 180,320" class="node-decision" filter="url(#shadow)" />
        <text x="260" y="318" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="500">有 tool_calls?</text>

        <rect x="380" y="305" width="100" height="36" rx="8" class="node-end" filter="url(#shadow)" />
        <text x="430" y="328" text-anchor="middle" fill="white" font-size="12">return 结束</text>

        <rect x="80" y="305" width="100" height="36" rx="8" class="node-rect" filter="url(#shadow)" />
        <text x="130" y="328" text-anchor="middle" fill="#e6edf3" font-size="11">遍历 tool_call</text>

        <rect x="80" y="365" width="140" height="36" rx="8" class="node-rect" filter="url(#shadow)" />
        <text x="150" y="387" text-anchor="middle" fill="#e6edf3" font-size="11">executeToolCall()</text>

        <rect x="190" y="365" width="120" height="36" rx="8" class="node-rect" filter="url(#shadow)" />
        <text x="250" y="387" text-anchor="middle" fill="#e6edf3" font-size="11">追加 tool 消息</text>

        <!-- 箭头 -->
        <line x1="260" y1="60" x2="260" y2="80" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowhead)" />
        <line x1="260" y1="120" x2="260" y2="140" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowhead)" />
        <line x1="260" y1="180" x2="260" y2="200" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowhead)" />
        <line x1="260" y1="240" x2="260" y2="268" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowhead)" />

        <path d="M 260 322 L 350 322 L 380 323" stroke="#8b949e" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />
        <text x="310" y="315" fill="#3fb950" font-size="10">否</text>

        <path d="M 200 322 L 150 322 L 130 323" stroke="#8b949e" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />
        <text x="165" y="315" fill="#d29922" font-size="10">是</text>

        <line x1="130" y1="341" x2="130" y2="365" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowhead)" />
        <line x1="150" y1="383" x2="220" y2="383" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowhead)" />

        <path d="M 250 383 L 260 383 L 260 80" stroke="#8b949e" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="4 4" />
        <text x="265" y="230" fill="#58a6ff" font-size="9">循环</text>
      </svg>
    </div>
  </section>

  <!-- 2. ReAct 循环模式 -->
  <section class="diagram-section">
    <h2>2. ReAct 模式：想 → 做 → 观察</h2>
    <div class="diagram">
      <svg width="760" height="200" viewBox="0 0 760 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrow2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <path d="M0 0 L8 3 L0 6 Z" fill="#8b949e" />
          </marker>
        </defs>

        <rect x="40" y="70" width="120" height="60" rx="10" fill="#21262d" stroke="#30363d" />
        <text x="100" y="105" text-anchor="middle" fill="#e6edf3" font-size="13">用户输入</text>

        <rect x="200" y="70" width="120" height="60" rx="10" fill="#1c3d5a" stroke="#58a6ff" />
        <text x="260" y="105" text-anchor="middle" fill="#58a6ff" font-size="13">LLM 推理</text>

        <rect x="360" y="70" width="120" height="60" rx="10" fill="#3d2e1c" stroke="#d29922" />
        <text x="420" y="105" text-anchor="middle" fill="#d29922" font-size="13">执行工具</text>

        <rect x="520" y="70" width="120" height="60" rx="10" fill="#1c3d2e" stroke="#3fb950" />
        <text x="580" y="105" text-anchor="middle" fill="#3fb950" font-size="13">工具返回结果</text>

        <rect x="660" y="85" width="80" height="40" rx="8" fill="#238636" stroke="#2ea043" />
        <text x="700" y="110" text-anchor="middle" fill="white" font-size="11">最终回答</text>

        <line x1="160" y1="100" x2="200" y2="100" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow2)" />
        <line x1="320" y1="100" x2="360" y2="100" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow2)" />
        <text x="340" y="92" fill="#d29922" font-size="10">需要工具</text>

        <line x1="480" y1="100" x2="520" y2="100" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow2)" />

        <path d="M 580 130 L 580 160 L 260 160 L 260 130" stroke="#58a6ff" stroke-width="2" fill="none" marker-end="url(#arrow2)" stroke-dasharray="6 4" />
        <text x="420" y="150" fill="#58a6ff" font-size="10">观察后继续推理</text>

        <path d="M 260 70 L 260 40 L 680 40 L 680 85" stroke="#8b949e" stroke-width="1.5" fill="none" marker-end="url(#arrow2)" />
        <text x="470" y="30" fill="#8b949e" font-size="10">无需工具</text>
      </svg>
    </div>
  </section>

  <!-- 3. 类依赖关系 -->
  <section class="diagram-section">
    <h2>3. 六大组件依赖关系</h2>
    <div class="diagram">
      <svg width="640" height="360" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrow3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <path d="M0 0 L8 3 L0 6 Z" fill="#8b949e" />
          </marker>
        </defs>

        <rect x="260" y="20" width="120" height="50" rx="8" fill="#238636" stroke="#2ea043" />
        <text x="320" y="48" text-anchor="middle" fill="white" font-size="13" font-weight="500">Main</text>
        <text x="320" y="62" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="9">程序入口</text>

        <rect x="260" y="100" width="120" height="50" rx="8" fill="#1c3d5a" stroke="#58a6ff" />
        <text x="320" y="128" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="500">AgentLoop</text>
        <text x="320" y="142" text-anchor="middle" fill="#8b949e" font-size="9">核心循环</text>

        <rect x="260" y="180" width="120" height="50" rx="8" fill="#21262d" stroke="#30363d" />
        <text x="320" y="208" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="500">LLMClient</text>
        <text x="320" y="222" text-anchor="middle" fill="#8b949e" font-size="9">HTTP + API</text>

        <rect x="260" y="260" width="120" height="50" rx="8" fill="#21262d" stroke="#30363d" />
        <text x="320" y="288" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="500">AgentConfig</text>
        <text x="320" y="302" text-anchor="middle" fill="#8b949e" font-size="9">配置 + tools</text>

        <rect x="80" y="180" width="120" height="50" rx="8" fill="#3d2e1c" stroke="#d29922" />
        <text x="140" y="208" text-anchor="middle" fill="#d29922" font-size="13" font-weight="500">ToolExecutor</text>
        <text x="140" y="222" text-anchor="middle" fill="#8b949e" font-size="9">工具调度</text>

        <rect x="80" y="260" width="120" height="50" rx="8" fill="#1c3d2e" stroke="#3fb950" />
        <text x="140" y="288" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="500">BashTool</text>
        <text x="140" y="302" text-anchor="middle" fill="#8b949e" font-size="9">shell 执行</text>

        <line x1="320" y1="70" x2="320" y2="100" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow3)" />
        <line x1="320" y1="150" x2="320" y2="180" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow3)" />
        <line x1="320" y1="230" x2="320" y2="260" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow3)" />
        <line x1="260" y1="125" x2="200" y2="205" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow3)" />
        <line x1="140" y1="230" x2="140" y2="260" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow3)" />

        <rect x="460" y="100" width="140" height="140" rx="12" fill="transparent" stroke="#2d3548" stroke-dasharray="6 4" />
        <text x="530" y="90" text-anchor="middle" fill="#8b949e" font-size="10">模型网关层</text>
        <rect x="470" y="120" width="120" height="50" rx="8" fill="#21262d" stroke="#30363d" />
        <text x="530" y="148" text-anchor="middle" fill="#e6edf3" font-size="12">LLMClient</text>
        <rect x="470" y="190" width="120" height="50" rx="8" fill="#21262d" stroke="#30363d" />
        <text x="530" y="218" text-anchor="middle" fill="#e6edf3" font-size="12">AgentConfig</text>
      </svg>
    </div>
  </section>

  <!-- 4. 数据流转时序 -->
  <section class="diagram-section">
    <h2>4. 数据流转时序（简化）</h2>
    <div class="diagram">
      <svg width="720" height="280" viewBox="0 0 720 280" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrow4" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
            <path d="M0 0 L6 2 L0 4 Z" fill="#58a6ff" />
          </marker>
        </defs>

        <!-- 参与方 -->
        <text x="60" y="35" fill="#8b949e" font-size="11">用户</text>
        <text x="140" y="35" fill="#8b949e" font-size="11">Main</text>
        <text x="240" y="35" fill="#8b949e" font-size="11">AgentLoop</text>
        <text x="360" y="35" fill="#8b949e" font-size="11">LLMClient</text>
        <text x="480" y="35" fill="#8b949e" font-size="11">ToolExecutor</text>
        <text x="600" y="35" fill="#8b949e" font-size="11">BashTool</text>

        <!-- 生命线 -->
        <line x1="90" y1="50" x2="90" y2="260" stroke="#2d3548" stroke-width="1" />
        <line x1="170" y1="50" x2="170" y2="260" stroke="#2d3548" stroke-width="1" />
        <line x1="270" y1="50" x2="270" y2="260" stroke="#2d3548" stroke-width="1" />
        <line x1="390" y1="50" x2="390" y2="260" stroke="#2d3548" stroke-width="1" />
        <line x1="510" y1="50" x2="510" y2="260" stroke="#2d3548" stroke-width="1" />
        <line x1="630" y1="50" x2="630" y2="260" stroke="#2d3548" stroke-width="1" />

        <!-- 调用箭头 -->
        <path d="M 90 70 L 170 70" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow4)" />
        <text x="130" y="65" fill="#8b949e" font-size="9">输入</text>

        <path d="M 170 90 L 270 90" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow4)" />
        <text x="220" y="85" fill="#8b949e" font-size="9">run()</text>

        <path d="M 270 110 L 390 110" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow4)" />
        <text x="330" y="105" fill="#8b949e" font-size="9">completeChat()</text>

        <path d="M 390 130 L 390 150 L 510 150" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow4)" />
        <text x="450" y="145" fill="#8b949e" font-size="9">POST API</text>

        <path d="M 270 170 L 510 170" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow4)" />
        <text x="390" y="165" fill="#8b949e" font-size="9">executeToolCall</text>

        <path d="M 510 190 L 630 190" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow4)" />
        <text x="570" y="185" fill="#8b949e" font-size="9">run(cmd)</text>

        <path d="M 630 210 L 510 210" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow4)" />
        <text x="570" y="205" fill="#3fb950" font-size="9">返回</text>

        <rect x="250" y="230" width="240" height="24" rx="4" fill="#388bfd26" stroke="#58a6ff" />
        <text x="370" y="247" text-anchor="middle" fill="#58a6ff" font-size="10">循环直至无 tool_calls</text>
      </svg>
    </div>
  </section>
</body>
</html>
